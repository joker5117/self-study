<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>我的新聞App</title>
    <!-- 這行程式碼是用來把你的 CSS 樣式表跟這個網頁串連起來 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. 手機外框大箱子 -->
    <div class="phone-container">
        
        <!-- 2. 頂部狀態列 -->
        <div class="status-bar">
            <span>9:41</span>
        </div>

        <!-- 3. 焦點搜尋欄（內建輸入框） -->
        <div class="search-section">
            <input type="text" placeholder="🔍 焦點搜尋">
        </div>

        <!-- 4. 分類標籤區 -->
        <div class="category-tabs">
            <span class="active">推薦</span>
            <span>政治</span>
            <span>時事</span>
            <span>娛樂</span>
        </div>

        <!-- 5. 灰色新聞大矩形框（今天的主要挑戰目標！） -->
        <div class="main-news-box">
    
    <img class="news-img" src="phpuJLC46.jpg" alt="新聞圖片">
    
    <div class="news-info">
        <h3 class="news-title">歐國盃驚天逆轉！英格蘭補時倒掛金鉤絕平延長賽翻盤</h3>
        <p class="news-date">2026年7月6日 · 體育焦點</p>
    </div>

</div>

    </div>

</body>
</html>
