<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>我的新聞App</title>
    <!-- 這行程式碼是用來把你的 CSS 樣式表跟這個網頁串連起來 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. 手機外框大箱子 -->
    <div class="phone-container">
        
        <!-- 2. 頂部狀態列 -->
        <div class="status-bar">
            <span>9:41</span>
        </div>

        <!-- 3. 焦點搜尋欄（內建輸入框） -->
        <!-- 找到原本的搜尋區塊，替換成以下結構 -->
<div class="search-section">
    
    <!-- 1. 左邊圓形大頭貼（這裡我先放一個動漫頭像網址，你可以換成自己的） -->
    <img class="user-avatar" src="IMG_8840.jpeg" alt="用戶頭像">
    
    <!-- 2. 中間搜尋欄輸入框 -->
    <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="致癌物超標問題油">
    </div>
    
    <!-- 3. 右邊焦點回顧按鈕 -->
    <button class="review-btn">
        <span class="clock-icon">🕒</span> 焦點回顧
    </button>

</div>

        <!-- 4. 分類標籤區 -->
        <div class="category-tabs">
            <span class="active">推薦</span>
            <span>政治</span>
            <span>時事</span>
            <span>娛樂</span>
        </div>
